name: ✨ 功能请求 / Feature request
description: 提一个新功能或改进建议
title: "feat: <一句话描述>"
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你愿意把使用体感讲给我们听！请尽量先讲清楚 **场景** 和 **痛点**，
        而不是直接给一个具体的实现方案 — 不同实现方案的取舍我们一起在 issue 里讨论。

  - type: textarea
    id: problem
    attributes:
      label: 你遇到了什么问题 / What problem are you trying to solve?
      description: 现状下你被卡在哪里？或者哪里体验糟糕？
      placeholder: 我希望我的 AI 角色能记住"用户每周末喜欢爬山"，但目前长期记忆抽取偶尔会漏掉……
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你期望的解决方式 / Proposed solution
      description: 如果你已经有方案的想法，请说说。如果只想提需求让维护者来想方案，留空也行。

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / Alternatives considered
      description: 有没有想过其他做法？为什么没采用？

  - type: textarea
    id: context
    attributes:
      label: 补充信息 / Additional context
      description: 任何额外的截图、链接、参考资料。

  - type: checkboxes
    id: terms
    attributes:
      label: 自查 / Self-check
      options:
        - label: 我已搜索过现有 issues 和 discussions，没有重复
          required: true
        - label: 我理解维护者可能因为不在 roadmap 上而关闭这个 issue —— 不是不重视，而是不在当前路径上
          required: true
