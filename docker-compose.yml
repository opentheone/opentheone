services:
  opentheone:
    # Default to the prebuilt multi-arch image published by the Release
    # workflow (linux/amd64 + linux/arm64). Override OTO_IMAGE to pin a
    # specific version, e.g. `OTO_IMAGE=ghcr.io/opentheone/opentheone:v0.0.3`.
    image: ${OTO_IMAGE:-ghcr.io/opentheone/opentheone:latest}
    # Contributors who want to build from local source instead of pulling
    # from GHCR can uncomment the block below and run
    # `docker compose up -d --build`.
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    #   args:
    #     VERSION: ${OTO_VERSION:-dev}
    #     COMMIT: ${OTO_COMMIT:-local}
    #     BUILD_TIME: ${OTO_BUILD_TIME:-local}
    container_name: opentheone
    restart: unless-stopped
    ports:
      - "${OTO_HTTP_PORT:-8080}:8080"
    environment:
      # All settings can be overridden via OTO_* env vars. See backend/config.example.yaml
      # for the full list. Leaving jwt_secret empty makes the server auto-generate and
      # persist a random one at /app/data/secret.key on first start.
      OTO_AUTH_JWT_SECRET: ""
      OTO_AUTH_ALLOW_REGISTER: "true"
      OTO_LOGGING_LEVEL: "info"
      OTO_LOGGING_FORMAT: "json"
    volumes:
      - oto-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  oto-data:
